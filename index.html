        /* Chosen Palette: Coffee & Gold (Minimalist Musicianship) */
        :root {
            --bg-color: #fdfbf7;
            --sidebar-bg: #ffffff;
            --primary-amber: #b45309;
            --text-dark: #1c1917;
            --chord-color: #d97706;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
        }

        /* Essential for Chord Alignment */
        .chord-engine {
            font-family: 'Courier Prime', monospace;
            white-space: pre;
            direction: ltr !important;
            text-align: left !important;
            display: inline-block;
            min-width: 100%;
        }

        .chord {
            color: var(--chord-color);
            font-weight: 700;
        }

        .sidebar-item-active {
            background-color: #fef3c7;
            border-right: 4px solid var(--primary-amber);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .song-card { border: none; box-shadow: none; padding: 0; }
            .chord-engine { font-size: 11pt !important; }
        }
        
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-track { background: #f1f1f1; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

<!-- Main Interaction Area -->

            <div class="flex items-center bg-stone-100 rounded-lg p-1">

    </article>

</main>

1. Architecture: Single Page Application (SPA) designed as a "Smart Music Stand".

3. User Flow: User selects a song from the RTL Hebrew sidebar. The main stage displays the song in LTR layout.
4. Tools: Real-time Transposition engine shifts chord letters while preserving the spatial alignment (spaces/indentation).
-->

-->

    let currentActiveId = null;
    let currentKeyOffset = 0;
    const chromaticScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function initApp() {
        const menu = document.getElementById('song-menu');
        songData.forEach(song => {
            const btn = document.createElement('button');
            btn.className = "w-full text-right px-6 py-4 border-b border-stone-50 hover:bg-stone-50 transition-all flex flex-col items-start gap-1";
            btn.innerHTML = `
                <span class="font-bold text-stone-800">${song.title}</span>
                <span class="text-xs text-stone-400 font-mono tracking-tighter">${song.artist}</span>
            `;
            btn.onclick = () => loadSong(song.id, btn);
            menu.appendChild(btn);
        });
    }

    function loadSong(id, element) {
        currentActiveId = id;
        currentKeyOffset = 0;
        updateUI(element);
        renderSong();
    }

    function updateUI(activeBtn) {
        document.querySelectorAll('#song-menu button').forEach(b => b.classList.remove('sidebar-item-active'));
        activeBtn.classList.add('sidebar-item-active');
        
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('toolbar').classList.remove('hidden');
        document.getElementById('song-viewer').classList.remove('hidden');
        document.getElementById('key-label').innerText = "0";
    }

    function renderSong() {
        const song = songData.find(s => s.id === currentActiveId);
        if (!song) return;

        document.getElementById('song-title').innerText = song.title;
        document.getElementById('song-artist').innerText = song.artist;
        
        const introTransposed = transposeText(song.intro, currentKeyOffset);
        document.getElementById('display-intro').innerHTML = wrapChords(introTransposed);

        const contentTransposed = transposeText(song.content, currentKeyOffset);
        document.getElementById('main-chords').innerHTML = wrapChords(contentTransposed);
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function transposeText(text, offset) {
        if (offset === 0) return text;
        
        // Regex looks for musical notes while ignoring plain Portuguese words
        return text.replace(/[A-G][#b]?/g, (match) => {
            let idx = chromaticScale.indexOf(match);
            
            // Handle common flats by converting to sharps for the engine
            if (idx === -1) {
                const map = {"Bb": 10, "Eb": 3, "Ab": 8, "Db": 1, "Gb": 6};
                idx = map[match] ?? -1;
            }
            
            if (idx === -1) return match;
            
            let newIdx = (idx + offset) % 12;
            while (newIdx < 0) newIdx += 12;
            return chromaticScale[newIdx];
        });
    }

    function wrapChords(text) {
        // Regex to find chords (Notes + suffixes like m, 7, +, dim, etc.)
        const chordRegex = /\b[A-G](?:#|b)?(?:m|maj|dim|aug|[\+\d°/])*(?:\b|(?=\s))/g;
        return text.replace(chordRegex, match => `<span class="chord">${match}</span>`);
    }

    function transpose(val) {
        currentKeyOffset += val;
        document.getElementById('key-label').innerText = (currentKeyOffset > 0 ? "+" : "") + currentKeyOffset;
        renderSong();
    }

    function changeFontSize(size) {
        document.getElementById('main-chords').style.fontSize = size + 'px';
    }

    initApp();
</script>
